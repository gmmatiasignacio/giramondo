<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¡Pedido confirmado! — Giramondo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: #fff; color: #111; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.container { text-align: center; padding: 3rem 2rem; max-width: 480px; }
.check { font-size: 64px; margin-bottom: 1.5rem; }
h1 { font-family: 'DM Serif Display', serif; font-size: 36px; font-weight: 400; margin-bottom: 1rem; color: #111; }
p { font-size: 15px; color: #666; line-height: 1.7; margin-bottom: 2rem; font-weight: 300; }
.order-num { background: #f7f7f7; border-radius: 8px; padding: 12px 20px; font-size: 13px; color: #888; margin-bottom: 2rem; display: inline-block; }
.btn { background: #111; color: #fff; padding: 12px 28px; border-radius: 6px; border: none; font-size: 14px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; text-decoration: none; display: inline-block; }
.footer-note { margin-top: 2rem; font-size: 12px; color: #bbb; }
</style>
</head>
<body>
<div class="container">
  <div class="check">✅</div>
  <h1>¡Pedido confirmado!</h1>
  <p>Tu pago fue procesado correctamente. Estamos preparando tu pedido y te lo entregaremos pronto.</p>
  <div class="order-num" id="orderNum">Procesando orden...</div>
  <p>Si pediste antes de las 12:00 hrs, recibes <strong>hoy mismo</strong> en la Región Metropolitana.</p>
  <a href="/" class="btn">Volver a la tienda</a>
  <div class="footer-note">Giramondo · Te acercamos lo lejano</div>
</div>
<script>
var params = new URLSearchParams(window.location.search);
var order = params.get('order');
if (order) {
  document.getElementById('orderNum').textContent = 'Orden #' + order;
}
</script>
</body>
</html>
